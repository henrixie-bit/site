<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Map Preview</title>
<style>
  body { margin: 40px; font-family: sans-serif; background: #f5f5f5; }
  .map-container { max-width: 800px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
  h1 { text-align: center; margin-bottom: 20px; }
  svg { width: 100%; height: auto; }
  #tooltip { position: fixed; background: #222; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 13px; pointer-events: none; display: none; z-index: 999; }
</style>
</head>
<body>
<div class="map-container">
  <h1>Visited Countries</h1>
  <div id="map"></div>
</div>
<div id="tooltip"></div>
<script>
fetch('world-map.svg').then(r=>r.text()).then(svg=>{
  document.getElementById('map').innerHTML = svg;
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('[data-country]').forEach(el => {
    el.addEventListener('mouseenter', e => {
      tooltip.textContent = el.dataset.country;
      tooltip.style.display = 'block';
    });
    el.addEventListener('mousemove', e => {
      tooltip.style.left = e.clientX + 12 + 'px';
      tooltip.style.top = e.clientY - 8 + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
});
</script>
</body>
</html>
